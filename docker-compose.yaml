services:
  postgres:
    image: mysql:8.4
    container_name: itaprime
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - itaprime_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  itaprime_data:
